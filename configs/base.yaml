# =========================================
# base.yaml
# 背景意図:
#   - 全実験をこの1ファイルで再現可能にする
#   - モデル・前処理・推論条件を一元管理
# =========================================

# =========================
# 出力設定
# =========================
output:
  base_dir: "/workspace/logs"   # 背景意図: 実験結果を全てここに集約（再現・比較用）
  exp_name: "baseline_vace"  # 背景意図: 実験名（保存フォルダ名の接頭辞）
  exp_content: "frame一致を重視したVACE baseline検証"  # 背景意図: 実験の背景・目的

# =========================
# 前処理設定
# =========================
preprocess:
  long_side: 512       # 背景意図: 推論用サイズ（OOM防止＋速度優先）

# =========================
# モデル設定
# =========================
model:
  vace_repo: "./third_party/VACE"   # 背景意図: 外部repoをここに固定
  model_path: "./third_party/VACE/models/VACE-Wan2.1-1.3B-Preview"  # 背景意図: ダウンロード済みVACE重みディレクトリ
  entry_script: "inference.py"  # 背景意図: repo差異を吸収（ここだけ変えればOK）
  identity_fallback: true  # 背景意図: 重み未配置時は入力をそのまま出力して提出可能にする

# =========================
# 推論設定
# =========================
inference:
  seed: 42          # 背景意図: 再現性確保（ランキング安定化）
  steps: 25         # 背景意図: 速度と品質のバランス（短期コンペ向け）

# =========================
# 実行環境
# =========================
runtime:
  device: "cuda"    # 背景意図: GPU使用（速度必須）

# =========================
# 評価設定（将来拡張）
# =========================
evaluation:
  enable: true      # 背景意図: ローカルスコア計算ON/OFF
